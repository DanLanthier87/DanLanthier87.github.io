<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBC News Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-cbc">CBC</span>
          <span class="logo-label">News Reader</span>
        </div>
        <nav class="feed-tabs" id="feed-tabs">
          <button class="tab active" data-feed="https://www.cbc.ca/cmlink/rss-topstories">Top Stories</button>
          <button class="tab" data-feed="https://www.cbc.ca/cmlink/rss-canada">Canada</button>
          <button class="tab" data-feed="https://www.cbc.ca/cmlink/rss-politics">Politics</button>
          <button class="tab" data-feed="https://www.cbc.ca/cmlink/rss-world">World</button>
          <button class="tab" data-feed="https://www.cbc.ca/cmlink/rss-business">Business</button>
        </nav>
        <button class="btn-refresh" id="btn-refresh">&#8635; Refresh</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="toolbar">
      <p class="status-text" id="status-text">Loading…</p>
    </div>
    <div class="news-grid" id="news-grid"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Stories sourced from <strong>CBC News</strong> RSS feeds. Not affiliated with CBC/Radio-Canada.</p>
    </div>
  </footer>

  <script>
  (function () {
    const CACHE_PREFIX = 'cbc_reader_v1_';
    const CACHE_TTL    = 24 * 60 * 60 * 1000;

    const grid      = document.getElementById('news-grid');
    const statusEl  = document.getElementById('status-text');
    const refreshBtn= document.getElementById('btn-refresh');
    const tabs      = document.querySelectorAll('.tab');

    let activeFeed = tabs[0].dataset.feed;

    function cacheKey(url) {
      return CACHE_PREFIX + btoa(url).slice(0, 32);
    }

    function getCache(url) {
      try {
        const raw = localStorage.getItem(cacheKey(url));
        if (!raw) return null;
        const { ts, items } = JSON.parse(raw);
        if (Date.now() - ts < CACHE_TTL) return items;
      } catch (_) {}
      return null;
    }

    function setCache(url, items) {
      try {
        localStorage.setItem(cacheKey(url), JSON.stringify({ ts: Date.now(), items }));
      } catch (_) {}
    }

    function parseRSS(xmlText) {
      const parser = new DOMParser();
      const doc    = parser.parseFromString(xmlText, 'text/xml');
      const items  = Array.from(doc.querySelectorAll('item'));
      return items.map(item => ({
        title:   item.querySelector('title')?.textContent?.trim() ?? '',
        link:    item.querySelector('link')?.textContent?.trim() ?? '',
        pubDate: item.querySelector('pubDate')?.textContent?.trim() ?? '',
        desc:    (item.querySelector('description')?.textContent ?? '')
                   .replace(/<[^>]*>/g, '').trim().slice(0, 160)
      })).filter(i => i.title && i.link);
    }

    const PROXIES = [
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://thingproxy.freeboard.io/fetch/${url}`,
    ];

    async function fetchWithProxy(url) {
      for (const proxy of PROXIES) {
        try {
          const res = await fetch(proxy(url));
          if (!res.ok) continue;
          const text = await res.text();
          if (text.includes('<rss') || text.includes('<feed') || text.includes('<item')) return text;
        } catch (_) { continue; }
      }
      throw new Error('All proxies failed — check your connection');
    }

    async function fetchFeed(url, force) {
      if (!force) {
        const cached = getCache(url);
        if (cached) return { items: cached, fromCache: true };
      }

      const xml   = await fetchWithProxy(url);
      const items = parseRSS(xml);
      setCache(url, items);
      return { items, fromCache: false };
    }

    function renderItems(items, fromCache) {
      grid.innerHTML = '';

      if (!items.length) {
        grid.innerHTML = '<p class="empty">No stories found.</p>';
        statusEl.textContent = 'No results.';
        return;
      }

      const ts = fromCache ? ' (cached)' : ' (live)';
      statusEl.textContent = `${items.length} stories · ${new Date().toLocaleTimeString()}${ts}`;

      items.forEach(item => {
        const pub = item.pubDate
          ? new Date(item.pubDate).toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric' })
          : '';

        const card = document.createElement('a');
        card.className = 'card';
        card.href = item.link;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.innerHTML = `
          <div class="card-meta">
            <span class="card-source">CBC News</span>
            ${pub ? `<span class="card-date">${pub}</span>` : ''}
          </div>
          <h2>${item.title}</h2>
          ${item.desc ? `<p>${item.desc}…</p>` : ''}
          <span class="card-read">Read →</span>
        `;
        grid.appendChild(card);
      });
    }

    function showError(msg) {
      grid.innerHTML = `<p class="empty error">⚠ ${msg}</p>`;
      statusEl.textContent = 'Error loading feed.';
    }

    async function load(force) {
      refreshBtn.disabled = true;
      refreshBtn.textContent = '…';
      statusEl.textContent = 'Loading…';
      grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        const { items, fromCache } = await fetchFeed(activeFeed, force);
        renderItems(items, fromCache);
      } catch (err) {
        showError(`Could not load feed: ${err.message}`);
        console.error('[CBC Reader]', err);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = '↻ Refresh';
      }
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeFeed = tab.dataset.feed;
        load(false);
      });
    });

    refreshBtn.addEventListener('click', () => load(true));

    load(false);
  })();
  </script>

</body>
</html>
